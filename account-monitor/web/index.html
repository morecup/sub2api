<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号监控</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Account Monitor</div>
          <h1>监控账号</h1>
        </div>
        <div class="top-actions">
          <span id="connectionState" class="status-pill muted">未连接</span>
          <button id="logoutBtn" class="ghost hidden" type="button">退出</button>
        </div>
      </header>

      <main>
        <section id="loginPanel" class="auth-panel">
          <div class="auth-copy">
            <h2>输入监控程序 Token</h2>
            <p>Token 只保存在当前浏览器，用于调用本程序自己的接口。</p>
          </div>
          <form id="loginForm" class="auth-form">
            <input id="tokenInput" type="password" autocomplete="current-password" placeholder="auth_token" />
            <button type="submit">进入</button>
          </form>
        </section>

        <section id="workspace" class="workspace hidden">
          <nav class="tabs" aria-label="视图">
            <button class="tab active" data-view="accounts" type="button">监控账号</button>
            <button class="tab" data-view="add" type="button">添加账号</button>
            <button class="tab" data-view="settings" type="button">配置</button>
          </nav>

          <section id="accountsView" class="view active">
            <div class="summary-grid">
              <div class="metric">
                <span>总数</span>
                <strong id="metricTotal">0</strong>
              </div>
              <div class="metric good">
                <span>正常</span>
                <strong id="metricHealthy">0</strong>
              </div>
              <div class="metric bad">
                <span>异常</span>
                <strong id="metricUnhealthy">0</strong>
              </div>
              <div class="metric">
                <span>未知</span>
                <strong id="metricUnknown">0</strong>
              </div>
            </div>

            <div class="toolbar">
              <div>
                <h2>监控账号列表</h2>
                <p id="pollHint">前端会轮询刷新列表，后台会按配置检测异常并发送邮件。</p>
              </div>
              <button id="refreshAccountsBtn" type="button">刷新列表</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>平台</th>
                    <th>监控</th>
                    <th>状态</th>
                    <th>连续失败</th>
                    <th>最近检查</th>
                    <th>延迟</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="accountsBody"></tbody>
              </table>
              <div id="emptyAccounts" class="empty">还没有监控账号。</div>
            </div>
          </section>

          <section id="addView" class="view">
            <div class="split">
              <form id="watchExistingForm" class="panel">
                <h2>监控已有账号</h2>
                <label>账号名称<input name="account_name" required autocomplete="off" /></label>
                <label class="check-row"><input name="enabled" type="checkbox" checked /> 启用监控</label>
                <button type="submit">加入监控</button>
              </form>

              <form id="createAccountForm" class="panel">
                <h2>创建账号并监控</h2>
                <label>名称<input name="name" required /></label>
                <label>备注<textarea name="notes" rows="2"></textarea></label>
                <label>平台
                  <select name="platform">
                    <option value="openai" selected>OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="gemini">Gemini</option>
                    <option value="antigravity">Antigravity</option>
                  </select>
                </label>
                <label>类型
                  <select name="type">
                    <option value="oauth" selected>OAuth</option>
                    <option value="setup-token">Setup Token</option>
                    <option value="apikey">API Key</option>
                    <option value="upstream">Upstream</option>
                    <option value="bedrock">Bedrock</option>
                    <option value="service_account">Service Account</option>
                  </select>
                </label>
                <label>Credentials JSON<textarea name="credentials" rows="7" required placeholder='{"refresh_token":"..."}'></textarea></label>
                <label>Extra JSON<textarea name="extra" rows="5" placeholder="{}"></textarea></label>
                <div class="native-fields">
                  <label>Rate Multiplier<input name="rate_multiplier" type="number" min="0" step="0.01" /></label>
                  <label>Load Factor<input name="load_factor" type="number" min="1" max="10000" /></label>
                  <label>Expires At<input name="expires_at" type="datetime-local" /></label>
                </div>
                <label class="check-row"><input name="confirm_mixed_channel_risk" type="checkbox" /> 确认混合渠道风险</label>
                <label class="check-row"><input name="enabled" type="checkbox" checked /> 启用监控</label>
                <details class="advanced-fields">
                  <summary>监控字段</summary>
                  <label>测试模型<input name="model_id" placeholder="仅 test 检查模式使用" /></label>
                </details>
                <p class="form-note">proxy_id、concurrency、priority、group_ids 会使用全局配置覆盖。</p>
                <button type="submit">创建并加入监控</button>
              </form>
            </div>
          </section>

          <section id="settingsView" class="view">
            <form id="settingsForm" class="settings-grid">
              <fieldset>
                <legend>连接</legend>
                <label>监听地址<input name="listen" /></label>
                <label>监控 Token<input name="auth_token" placeholder="********" /></label>
                <label>监控 API Key<input name="api_key" placeholder="********" /></label>
                <label>sub2api 地址<input name="sub2api.base_url" /></label>
                <label>sub2api Admin API Key<input name="sub2api.admin_api_key" placeholder="********" /></label>
              </fieldset>

              <fieldset>
                <legend>轮询</legend>
                <label class="check-row"><input name="monitor.enabled" type="checkbox" /> 启用后台监控</label>
                <label>间隔秒数<input name="monitor.check_interval_seconds" type="number" min="5" /></label>
                <label>失败阈值<input name="monitor.failure_threshold" type="number" min="1" /></label>
                <label>恢复阈值<input name="monitor.recovery_threshold" type="number" min="1" /></label>
                <label>检查模式<select name="monitor.check_mode"><option value="status">status</option><option value="test">test</option></select></label>
                <label>默认测试模型<input name="monitor.default_model_id" /></label>
                <label class="check-row"><input name="monitor.notify_on_recovery" type="checkbox" /> 恢复时发送邮件</label>
              </fieldset>

              <fieldset>
                <legend>账号默认值</legend>
                <label class="check-row"><input name="account_defaults.use_proxy" type="checkbox" /> 使用代理</label>
                <label>代理 ID<input name="account_defaults.proxy_id" type="number" min="1" /></label>
                <label>优先级<input name="account_defaults.priority" type="number" min="1" /></label>
                <label>并发<input name="account_defaults.concurrency" type="number" min="1" /></label>
                <label>默认分组 ID<input name="account_defaults.group_ids" placeholder="1,2,3" /></label>
              </fieldset>

              <fieldset>
                <legend>邮件</legend>
                <label class="check-row"><input name="email.enabled" type="checkbox" /> 启用邮件</label>
                <label>SMTP Host<input name="email.smtp_host" /></label>
                <label>SMTP Port<input name="email.smtp_port" type="number" min="1" /></label>
                <label>用户名<input name="email.username" /></label>
                <label>密码<input name="email.password" placeholder="********" /></label>
                <label>发件人<input name="email.from" /></label>
                <label>发件人名称<input name="email.from_name" /></label>
                <label class="check-row"><input name="email.use_tls" type="checkbox" /> 直接使用 TLS</label>
                <label>收件人<textarea name="email.to" rows="3" placeholder="a@example.com, b@example.com"></textarea></label>
              </fieldset>

              <div class="settings-actions">
                <button id="reloadConfigBtn" type="button">重新加载</button>
                <button type="submit">保存配置</button>
              </div>
            </form>
          </section>
        </section>
      </main>

      <div id="toast" class="toast hidden"></div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
